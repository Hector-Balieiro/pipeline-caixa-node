name: CI Reporter & Analytics
 
on:
  workflow_run:
    workflows: ["Node.js CI/CD"] # Deve ser exatamente o 'name' do seu yaml de CI
    types:
      - completed # Dispara apenas quando o CI termina (sucesso ou falha)
 
jobs:
  process-report:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Coletar Dados do Workflow Original
        id: info
        run: |
          # Identifica o status do CI original (success, failure, etc.)
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          echo "conclusion=$CONCLUSION" >> $GITHUB_OUTPUT
          if [ "$CONCLUSION" = "success" ]; then
            echo "emoji=✅ SUCESSO" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌ FALHA" >> $GITHUB_OUTPUT
          
 
      # =================================================================
      # ITEM A: Job Summary no novo Workflow
      # =================================================================
      - name: Gerar Relatório de Execução (Job Summary)
        run: |
          echo "# 📊 Relatório Consolidado do CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Detalhe |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status Final** | ${{ steps.info.outputs.emoji }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.event.workflow_run.head_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.event.workflow_run.head_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **ID da Execução** | [Ver CI Original](${{ github.event.workflow_run.html_url }}) |" >> $GITHUB_STEP_SUMMARY
 
      # =================================================================
      # ITEM B: Alerta de Erro se o Workflow original falhou
      # =================================================================
      - name: Alerta de Erro Crítico
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        run: |
          echo "::error title=Falha Detectada no CI::O workflow original [${{ github.event.workflow_run.name }}] falhou na branch ${{ github.event.workflow_run.head_branch }}."